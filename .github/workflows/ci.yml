name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - feat/**
      - fix/**
      - chore/**
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync --group dev

      - run: uv run ruff check .

      - run: uv run pytest
