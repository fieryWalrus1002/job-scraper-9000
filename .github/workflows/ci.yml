name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# cancel if we're running on a PR, since the PR workflow will run the same tests
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync --group dev

      - run: uv run ruff check .

      - run: uv run pytest

      # Docker-backed integration tests (live Postgres, Azurite) are excluded
      # from the default run; run them explicitly here. The GitHub runner has a
      # Docker daemon available. The API container_startup tests still skip
      # unless the image is built, as before.
      - run: uv run pytest -m docker

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
