name: PR Summarizer

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Context
        run: |
          TARGET="${{ github.base_ref }}"
          CURRENT="${{ github.head_ref }}"
          echo "### COMMIT HISTORY" > context.md
          git log origin/$TARGET..origin/$CURRENT --pretty=format:"- %s%n%b" >> context.md
          echo -e "\n### LOGIC CHANGES" >> context.md
          git diff origin/$TARGET..origin/$CURRENT -- src/ >> context.md

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install Dependencies
        run: uv sync

      - name: AI Synthesis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/summarize_pr.py

      - name: The Voice (Post PR Comment)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('ai_response.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            })