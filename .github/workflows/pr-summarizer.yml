name: PR Summarizer

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Context
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Pull down the base branch reference so the git graph is populated locally
          git fetch origin "$BASE_REF"

          echo "### COMMIT HISTORY" > context.md
          git log FETCH_HEAD...HEAD --pretty=format:"- %s%n%b" >> context.md
          echo -e "\n### LOGIC CHANGES" >> context.md
          git diff FETCH_HEAD...HEAD -- src/ >> context.md

      - name: AI Synthesis via Container
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_RAW: ${{ github.repository }}
        run: |
          # Handle the lowercase transformation for the Docker image path safely
          REPO_LOWER=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')

          # Spin up the precompiled environment, feeding context.md in
          docker run --rm \
            -e OPENAI_API_KEY \
            -v $(pwd):/workspace \
            -w /workspace \
            ghcr.io/${REPO_LOWER}/ai-reviewer:latest \
            uv run python scripts/summarize_pr.py < context.md > ai_response.txt

      - name: The Voice (Post PR Comment)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Check if the file exists and has actual content before posting a comment
            if (fs.existsSync('ai_response.txt') && fs.readFileSync('ai_response.txt', 'utf8').trim()) {
              const summary = fs.readFileSync('ai_response.txt', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } else {
              console.log("Empty summary output — skipping comment.");
            }
