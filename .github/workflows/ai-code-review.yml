name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

# A PR's `synchronize` event fires on every push; cancel an in-flight review
# when a newer push arrives so we don't pay for (or comment from) stale runs.
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Prevent running on forks where secrets are inaccessible.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      # Only first-party pieces touch the secrets: actions/checkout, the runner's
      # preinstalled `gh` CLI, and our container image.
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate review diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Ensure local git tracking knows about the target branch base.
          git fetch origin "$BASE_REF"

          # Use git's diff flag directly for full function context.
          git diff --function-context FETCH_HEAD...HEAD > raw_diff.txt

      - name: Generate AI review via Container
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_CODE_REVIEW_API_KEY }}
          PR: ${{ github.event.pull_request.number }}
          # Pass the raw repository path into the environment
          REPO_RAW: ${{ github.repository }}
        run: |
          # Convert the repository path to strictly lowercase using bash
          REPO_LOWER=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')

          echo "Pulling image from: ghcr.io/${REPO_LOWER}/ai-reviewer:latest"

          # Spin up your precompiled package using the verified lowercase string
          docker run --rm \
            -e OPENAI_API_KEY \
            -v $(pwd):/workspace \
            -w /workspace \
            ghcr.io/${REPO_LOWER}/ai-reviewer:latest \
            uv run python src/ci/ai_review.py --pr "$PR" < raw_diff.txt > review.md

      - name: Post or update PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -s review.md ]; then
            # FIXED: Scan existing issue comments specifically for our script's unique tracking identifier.
            EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR/comments" --jq '.[] | select(.body | startswith("")) | .id' | head -n 1)

            if [ -n "$EXISTING_COMMENT_ID" ]; then
              echo "Updating existing review comment ID: $EXISTING_COMMENT_ID"
              gh api "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" -X PATCH -F body=@review.md
            else
              echo "No previous review found. Posting a fresh comment."
              gh pr comment "$PR" --body-file review.md
            fi
          else
            echo "No review output — skipping comment."
          fi
