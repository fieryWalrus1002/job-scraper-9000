name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

# A PR's `synchronize` event fires on every push; cancel an in-flight review
# when a newer push arrives so we don't pay for (or comment from) stale runs.
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: OpenAI Code Review
        # Pinned to the v4.0 commit SHA (not the mutable tag): this third-party
        # action receives pull-requests:write and the OpenAI key, so it must
        # not be able to change under us. Re-pin when bumping the version.
        uses: sshnaidm/gpt-code-review-action@cf3e306be26ebbc2bf893dbaa6b7db5267269d07 # v4.0
        with:
          openai-key: ${{ secrets.OPENAI_CODE_REVIEW_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
          model: 'gpt-5.4-mini'
          prompt: >-
            You are a senior engineer reviewing a pull request for a Python
            data-pipeline repo (scrapes job postings, then LLM agents filter
            and rank them). Focus on, in priority order:
            (1) Correctness bugs and logic errors.
            (2) Security issues — committed secrets or credentials, unsafe
            subprocess/SQL/deserialization, secrets logged or sent to third
            parties. Note that .env holds secrets and must never be committed.
            (3) Silent failures. This codebase's rule is fail fast and log
            loudly: flag swallowed exceptions, bare excepts, empty results
            returned in place of an error, or error paths with no log/stack
            trace.
            (4) Clear design and reuse — duplicated logic, dead code, leaky
            abstractions.
            Skip pure formatting, import order, and lint nits: ruff and pyright
            already gate those in pre-commit. Be concise, cite specific lines,
            and prefer a few high-confidence findings over an exhaustive list.
            If the diff looks clean, say so rather than inventing problems.
