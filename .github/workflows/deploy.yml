name: Deploy

# Runs after CI passes on main. All three jobs are independent and run in parallel.
#
# Required repo secrets:
#   AZURE_CREDENTIALS      — service principal JSON (az ad sp create-for-rbac --sdk-auth)
#                            needs Contributor on rg-jobscraper + AcrPush on the ACR
#   SWA_DEPLOYMENT_TOKEN   — az staticwebapp secrets list \
#                              --name jobscraper-swa --resource-group rg-jobscraper \
#                              --query "properties.apiKey" -o tsv

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push API image, update ACA revision
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          ACR_LOGIN_SERVER=$(az acr list -g rg-jobscraper --query "[0].loginServer" -o tsv)
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          az acr login --name "$ACR_NAME"
          docker build --target backend -f docker/app.Dockerfile \
            -t "${ACR_LOGIN_SERVER}/jobscraper-api:${IMAGE_TAG}" \
            -t "${ACR_LOGIN_SERVER}/jobscraper-api:latest" .
          docker push "${ACR_LOGIN_SERVER}/jobscraper-api:${IMAGE_TAG}"
          docker push "${ACR_LOGIN_SERVER}/jobscraper-api:latest"
          az containerapp update \
            --name jobscraper-api \
            --resource-group rg-jobscraper \
            --image "${ACR_LOGIN_SERVER}/jobscraper-api:${IMAGE_TAG}"

  deploy-ingest:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push ingest image
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          ACR_LOGIN_SERVER=$(az acr list -g rg-jobscraper --query "[0].loginServer" -o tsv)
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          az acr login --name "$ACR_NAME"
          docker build -f docker/ingest.Dockerfile \
            -t "${ACR_LOGIN_SERVER}/jobscraper-ingest:${IMAGE_TAG}" \
            -t "${ACR_LOGIN_SERVER}/jobscraper-ingest:latest" .
          docker push "${ACR_LOGIN_SERVER}/jobscraper-ingest:${IMAGE_TAG}"
          docker push "${ACR_LOGIN_SERVER}/jobscraper-ingest:latest"

  deploy-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          AZURE_TENANT_ID=$(az account show --query tenantId -o tsv) npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true
