name: Publish CI Image

on:
  push:
    branches: [main]
    paths:
      - 'src/ci/**'
      - 'Dockerfile'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial for pushing and deleting images from GHCR
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GitHub Packages
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-reviewer:latest

      - name: Prune Old Untagged Images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List untagged versions and delete them via gh api
          gh api orgs/${{ github.repository_owner }}/packages/container/ai-reviewer/versions --jq '.[] | select(.metadata.container.tags | length == 0) | .id' | while read -r id; do
            gh api "orgs/${{ github.repository_owner }}/packages/container/ai-reviewer/versions/$id" -X DELETE
          done
