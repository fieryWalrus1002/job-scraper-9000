repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies: ['mdformat-gfm']
        exclude: '^(\.github/ISSUE_TEMPLATE/|prompts/)'

  - repo: local
    hooks:
      - id: frontend-format-check
        name: Frontend Prettier check
        language: system
        entry: frontend/node_modules/.bin/prettier --check --ignore-path frontend/.prettierignore
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|html)$
      - id: frontend-build
        name: Frontend TypeScript build
        language: system
        entry: bash -c 'cd frontend && npm run build'
        files: ^frontend/
        pass_filenames: false
