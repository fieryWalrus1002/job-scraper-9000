  - No frequent travel (>15 days/year)
  - Prefer full-time roles; open to contract or contract-to-hire when fit is strong
  - "Compensation: $150K target, $180K+ stretch, $120K floor (candidate has M.S. + 14 years professional experience — not entry-level pay). Postings substantially below floor (under ~$95K total comp, ~20%+ below) MUST be flagged in hard_concerns as 'compensation substantially below candidate floor' — dispatcher rejects these regardless of fit. Postings between $95K and $120K: flag in hard_concerns but score on other criteria (room for strong-fit enterprise foot-in-the-door, not blanket reject)."

