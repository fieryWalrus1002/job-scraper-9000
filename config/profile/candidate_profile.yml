# Candidate profile — first-pass skills_fit scoring.
#
# `profile_version` is recorded in every scored record's metadata (plus a
# sha256 of the file) so runs are comparable across profile changes. Bump
# on every edit.
#
# First-pass revision based on multi-agent feedback + repo audits:
# - Adjudicated PyTorch / CV / applied-ML claims (grana_cnn audit: real)
# - Confirmed C++ systems / network management / testing depth (nms audit)
# - Removed AWS — no evidence in any repo, multi-agent consensus says wrong
# - Promoted testing / testability discipline (nms + FluorInduc evidence)
# - Added SNMP / network management (nms; rare and distinctive)
# - Added legacy C++ modernization (nms is exactly this)
# - Identity reframed: primary signal is C++ systems engineering; LLM /
#   data engineering is growth direction, not current center of gravity
#
# v2 update (az-hydroflow-dpl audit, 2026-05-20):
# - Confirmed Pydantic v2 validation discipline beyond job-scraper-9000
# - Confirmed DuckDB usage (notebook-level data exploration + benchmarking)
# - Confirmed GitHub Actions CI and modern Python packaging (uv) practice
# - Azure / Bicep / ADLS stay aspirational: az-hydroflow-dpl's Phases 3-4
#   are deliberately unstarted; the cloud-native framing was the *plan*,
#   not the *evidence*
#
# v3 update (resume audit, 2026-05-20):
# - Incorporates evidence the repo audits missed. Repo audits only see what
#   commits to git, so they systematically miss operational work, people-
#   facing work, physical work, and pre-git career.
# - Added: 14 years technical mentorship (grad/postdoc + university course)
# - Added: MLOps practice as past-tense lab achievement (not aspirational)
# - Added: Multi-TB on-prem data pipelines (14 years operational longevity)
# - Added: Schema migration / BerkeleyDB engineering
# - Added: Custom scientific instrumentation design (Si-photodiode rigs)
# - Added: Linux/Proxmox sysadmin depth (homelab + production RHEL 9)
# - Added: NMS operational scale (~3,500 APs, ~50K active MACs/day, DHCP/DNS
#   build is load-bearing on the ingestion cycle)
# - Restored: AWS as hobby/personal exposure (FoundryVTT during COVID, web
#   hosting). Explicitly NOT production.
# - Restored: Azure as real (ML training on Azure compute with blob storage)
# - Added: Publications (PNAS x2, Plant and Cell Physiology) — research
#   credibility signal that doesn't fit "skill list" shape
# - Added: M.S. Agricultural Engineering (deep-learning focus, conferred
#   May 2026) — current credential. B.A. (Anthropology, 2007) dropped from
#   profile (irrelevant to tech roles + age-inference vector).
# - Relaxed level: mid-level through principal IC, open to tech-lead and
#   engineering management (no professional people-mgmt yet but open to
#   growing into it as part of breaking into enterprise). Director / VP /
#   C-suite still out.
# - Tightened compensation: substantially-under-floor pay is a hard reject
#   via hard_concerns, not just a flag.
# - Rewrote location constraint: Pullman/Moscow local OR fully-remote US;
#   trust upstream filters, don't over-penalize on location alone.
# - Added section `evidence_highlights` (not currently consumed by prompt)
#   for credibility signals that don't fit "skill list" shape.

profile_version: "2026-05-20-v3-draft"

summary: |
  Senior C++ systems engineer specializing in modernizing legacy production
  codebases. Strongest current evidence: a multi-year contract on a
  production network-management system handling ~3,500 access points, ~350
  switches, and 150–200K unique client MAC addresses (~50K active per day)
  — authored ~60% of a 322K-LOC C++ tree, built out the GTest/GMock harness
  from scratch, shipped Docker/RPM build infrastructure, and re-architected
  the device data store from opaque C-struct binary blobs to schema-
  validated JSON in BerkeleyDB. The 6-minute ingestion cycle is load-
  bearing for the network's DHCP/DNS configuration build. Comfortable
  end-to-end: design, testability refactoring, schema migration, packaging,
  deployment.

  Secondary capability in applied ML and computer vision from 14 years in
  a scientific research lab — established MLOps practice (PyTorch image
  segmentation models trained on Azure compute, inference operationalized
  into the lab's standard analysis workflow), operated multi-TB on-prem
  data pipelines for imaging and spectroscopy instruments, designed and
  built custom Si-photodiode instrumentation (microcontrollers, Raspberry
  Pi, Python) when commercial tools couldn't capture the required
  measurements.

  Currently building toward LLM application and agent-evaluation tooling —
  structured-output agents with Pydantic, local LLM inference with Ollama,
  eval harnesses with ordinal metrics on hand-scored gold sets, data
  pipelines with pandas/PyArrow/Parquet.

  14 years of technical mentorship from the research-lab senior role:
  mentored graduate and post-doctoral researchers on instrumentation,
  experimental design, reproducible data analysis, and custom instrument
  build-out; plus one university course taught on data processing and
  analysis. Co-author on 3 peer-reviewed papers (PNAS x2, Plant and Cell
  Physiology). M.S. Agricultural Engineering (Washington State University,
  defended Dec 2025, conferred May 2026) with focus on agricultural
  automation and deep-learning applications.

  Looking for fully-remote US roles, or on-site/hybrid in Pullman, WA /
  Moscow, ID.

level: |
  Mid-level through principal IC. Open to tech-lead and engineering
  management roles where the technical work is substantial. Not seeking
  junior/entry-level roles (14 years professional experience puts the
  candidate past that). No professional people-management experience yet
  (career planning, performance reviews, hiring/firing) — open to growing
  into it as part of breaking into enterprise from a consulting +
  scientific-research background. Director / VP / C-suite roles are out
  (insufficient people-management depth to back them up).

