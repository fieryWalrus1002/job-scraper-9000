llm:
  # Provider options: openai | ollama
  #
  # Optional `api_key_env` names which env var holds the OpenAI key.
  # Defaults to OPENAI_API_KEY. Use this to scope an agent to its own key
  # (e.g., api_key_env: OPENAI_API_KEY_SKILLS_FIT) for per-component spend
  # attribution and per-key spending caps in the OpenAI dashboard.
  #
  # |-- OpenAI --|
  provider: openai
  model: gpt-4o-mini
  temperature: 0.1
  api_key_env: OPENAI_API_KEY
  # concurrent LLM calls; ~8 is safe for gpt-4o-mini at a normal usage tier
  max_workers: 8

  # |-- Ollama --|
  # provider: ollama
  # model: qwen-27b-mtp
  # temperature: 0.1
  # base_url: http://localhost:11434/v1   # uncomment for ollama

  # |-- llama.cpp --|
  # provider: ollama # is really llama.cpp but uses ollama-compatible API
  # model: qwen-27b-mtp
  # temperature: 0.1
  # base_url: http://localhost:8080/v1   # was 11434 (Ollama default); llama.cpp uses 8080

policy_thresholds:
  disallowed_classifications:
    - "onsite_disguised"
    - "hybrid"
    # location_restricted is intentionally excluded — geographic and timezone
    # checks below handle it with actual user location/timezone matching.

  travel:
    # Sole travel gate as of SCHEMA_VERSION 3.0.0. The old per-category buckets
    # (remote_with_*_travel) were dropped; travel is judged on the numeric
    # estimate the model emits.
    max_estimated_days_per_year: 15

  relocation:
    allow_required_relocation: false
    allow_local_presence_required: false

  uncertainty:
    # Options: "reject", "pass"
    on_unclear_classification: "reject"

  timezone:
    # Your local timezone — injected as context so the model can reason about overlap.
    # Overridden at runtime by USER_TIMEZONE env var if set.
    user_timezone: "PST"
    # Postings that require ONLY one of these timezones will be rejected.
    # Timezones not listed here (PST, MST, CST, or unspecified) are acceptable.
    rejected_timezone_keywords:
      - "EST"
      - "ET"
      - "Eastern"
      - "Eastern time"
      - "Eastern Standard Time"
