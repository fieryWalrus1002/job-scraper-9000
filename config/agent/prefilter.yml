# Deterministic prefilter policy
#
# Keep this simple: the scraper decides what to fetch, and the prefilter decides
# how to route the scraped records before the paid remote filter runs.

country: USA

country_detection:
  enabled: true
  sources:
    - location
    - description
  aliases:
    USA:
      - US
      - U.S.
      - United States
      - United States of America
      - America
      - United States (US)
  unknown_policy: continue

local_area:
  # Add the exact local area strings that should bypass the remote filter.
  # HOME_LOCATION is already used elsewhere in this repo and expands from .env.
  allowed_locations:
    - ${HOME_LOCATION}
  home_location: ${HOME_LOCATION}

routing:
  route_local_jobs: true
  route_remote_candidates: true
  reject_non_us: true
  prefer_search_params_as_weak_signal: true


filter_terms:
  # For each of these categories, if any of the specified keywords are present in the title, location, description,
  # or search params, the job will be rejected with a matched rule of "banned_term:{term}".
  ai_factory_keywords:
    - dataannotation # The bulk of the jobs are from this company
    - alignerr # yeah screw you too
    - rex.zone # remote "talent" platform for "data annotation" work, often with a "research" or "engineer" title attached to what is basically glorified microwork. Not a real company name, so it triggers on the word "zone" in other contexts.
    - haystack  # same deal, remote "talent" platform for "data annotation"
    - remotasks
    - crowdgen
    - welocalize
    - oneforma
    - telus digital
