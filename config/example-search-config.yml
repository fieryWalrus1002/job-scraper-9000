# job-scraper-9000 search config

global:
  default_max_results: 50
  hours_old: 48
  linkedin_time: week
  salary_floor_k: 120

linkedin:
  experience: "2,3,4,5"
  workplace: remote
  job_type: fulltime

  searches:
    - keywords: "data engineer"
    - keywords: "AI engineer"
    - keywords: "machine learning engineer"
    - keywords: "software engineer"
    - keywords: "computer vision engineer"
    - keywords: "MLOps engineer"
    - keywords: "geospatial data engineer"

jobspy:
  # we covered linked in with the linkedin scraper, so no need to duplicate those results here
  sites: indeed,zip_recruiter
  no_remote: false

  searches:
    # Hometown/onsite — broad terms, small market
    # Set this in the .env file to avoid hardcoding your location in the config
    - search_term: "data engineer"
      location: "${HOME_LOCATION}"
    - search_term: "software engineer"
      location: "${HOME_LOCATION}"
    - search_term: "machine learning engineer"
      location: "${HOME_LOCATION}"
    - search_term: "AI engineer"
      location: "${HOME_LOCATION}"

    # Remote — mirrors LinkedIn core terms to get Indeed/ZipRecruiter coverage
    - search_term: "data engineer"
    - search_term: "AI engineer"
    - search_term: "machine learning engineer"
    - search_term: "software engineer"
    - search_term: "MLOps engineer"
    - search_term: "computer vision engineer"


### ------- Board-based scrapers -------
# These scrapers pull all jobs from a given company's job board, then filter by recency/salary.
# They are best for companies you know you want to work for, since they will pull all roles 
# (not just those matching specific keywords).
# In our workflow, we'll filter through these in the next step to match the ones we actually want to apply to.


greenhouse:
  boards:
    - anthropic
    - openai
    - microsoft
    - amazon
    - palantir
    - planet-labs
    - descartes-labs
    - scale-ai

ashby:
  companies:
    - mistral
    - cohere
    - harvey
    - perplexity

lever:
  companies:
    - deepmind
    - google
    - meta
    - nvidia
    - apple
    - ai21