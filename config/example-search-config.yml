# job-scraper-9000 search config
# Each entry maps directly to one scraper.scrape() call

global:
  default_max_results: 50
  hours_old: 48          # used by jobspy
  linkedin_time: week    # day | week | month | any
  salary_floor_k: 120    # thousands

linkedin:
  experience: "4,5"      # 4=mid-senior, 5=director
  workplace: remote
  job_type: fulltime

  searches:
    - keywords: "senior machine learning engineer"
    - keywords: "MLOps engineer"
    - keywords: "senior data engineer"
    - keywords: "AI engineer"
    - keywords: "computer vision engineer"
    - keywords: "senior software engineer"
    - keywords: "geospatial data engineer"
    - keywords: "LLMOps engineer"
    - keywords: "platform engineer AI"

jobspy:
  sites: linkedin,indeed,zip_recruiter
  no_remote: false

  searches:
    # jobspy location field handles onsite near Pullman
    - search_term: "data engineer"
      location: "Pullman, WA"
    - search_term: "software engineer"
      location: "Pullman, WA"
    - search_term: "machine learning engineer"
      location: "Pullman, WA"
    # Remote searches — location="USA" is the jobspy default
    - search_term: "MLOps engineer"
    - search_term: "AI engineer"
    - search_term: "LLMOps"
    - search_term: "geospatial data engineer"

greenhouse:
  # ATS boards to sweep — no keyword search, just dump and let the scorer filter
  boards:
    - anthropic
    - openai
    - microsoft
    - amazon
    - palantir
    - planet-labs       # geospatial/remote sensing
    - descartes-labs    # same
    - scale-ai