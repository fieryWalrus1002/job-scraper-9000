# job-scraper-9000 search config

global:
  default_max_results: 50
  hours_old: 48
  linkedin_time: week
  salary_floor_k: 120

### ------- Board-based scrapers -------
# These scrapers pull all jobs from a given company's job board, then filter by recency/salary.
# They are best for companies you know you want to work for, since they will pull all roles 
# (not just those matching specific keywords).
# In our workflow, we'll filter through these in the next step to match the ones we actually want to apply to.

ashby:
  companies:
    - mistral
    - cohere
    - harvey
    - perplexity

lever:
  companies:
    - deepmind
    - meta
    - nvidia
    - ai21
    - replit
    - scale-ai
    - figma
    - notion
    - stripe