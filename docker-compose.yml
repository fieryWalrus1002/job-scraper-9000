services:
  backend:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  scraper:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: scraper
    profiles:
      - pipeline
    volumes:
      - ./data:/app/data
